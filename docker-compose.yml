# PeopleDesk local stack: postgres (+pgvector), api, web.
# Bring up with:  docker compose up --build
# Requires a filled-in .env (copy from .env.example).

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-peopledesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-real-life}
      POSTGRES_DB: ${POSTGRES_DB:-peopledesk}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-peopledesk} -d ${POSTGRES_DB:-peopledesk}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    env_file: .env
    environment:
      # inside compose the DB host is the service name
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-peopledesk}:${POSTGRES_PASSWORD:-change-me-in-real-life}@postgres:5432/${POSTGRES_DB:-peopledesk}
      SEED_ON_START: ${SEED_ON_START:-true}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build: ./web
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  pgdata:
